version: "3"

vars:
  TS_DIR: ts-agent
  DASHBOARD_DIR: ts-agent/src/dashboard
  API_PORT: '{{default "8787" .API_PORT}}'
  UI_PORT: '{{default "5173" .UI_PORT}}'

tasks:
  default:
    desc: タスク一覧
    cmds:
      - task --list-all

  deps:
    desc: 依存関係をインストール
    cmds:
      - cmd: bun install
        dir: "{{.TS_DIR}}"
      - cmd: npm install
        dir: "{{.DASHBOARD_DIR}}"

  qa:
    desc: format + lint + typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format
      - bun run lint
      - bun run typecheck

  qa:fast:
    desc: lint + typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run lint
      - bun run typecheck

  format:
    desc: format
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format

  lint:
    desc: lint
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run lint

  typecheck:
    desc: typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run typecheck

  api:
    desc: API起動
    dir: "{{.TS_DIR}}"
    cmds:
      - UQTL_API_PORT={{.API_PORT}} bun run start:api

  ui:
    desc: UI起動
    dir: "{{.DASHBOARD_DIR}}"
    cmds:
      - npm run dev -- --host 127.0.0.1 --port {{.UI_PORT}}

  view:
    desc: API + UI 起動
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          cleanup() {
            [ -n "${api_pid:-}" ] && kill "$api_pid" 2>/dev/null || true;
            [ -n "${ui_pid:-}" ] && kill "$ui_pid" 2>/dev/null || true;
            fuser -k {{.API_PORT}}/tcp 2>/dev/null || true;
            fuser -k {{.UI_PORT}}/tcp 2>/dev/null || true;
          };
          trap cleanup EXIT INT TERM;
          (cd {{.TS_DIR}} && UQTL_API_PORT={{.API_PORT}} bun run start:api) & api_pid=$!;
          (cd {{.DASHBOARD_DIR}} && npm run dev -- --host 127.0.0.1 --port {{.UI_PORT}}) & ui_pid=$!;
          wait "$ui_pid"'

  pipeline:orchestrate:
    desc: 設計本流（sequence/simpleflowchart準拠）
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run start

  pipeline:verify:
    desc: API検証
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run verify:api

  pipeline:discover:
    desc: 因子探索
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:alpha-discovery

  pipeline:benchmark:
    desc: 基礎ベンチマーク
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run pipeline:backtest

  pipeline:analyze:
    desc: モデル分析
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:model-analysis

  pipeline:mine:
    desc: マイニング
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run pipeline:mine

  pipeline:verification-plot:
    desc: 監査プロット生成（JSON+4パネルPNG）
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:verification-json
      - bun run experiments:verification-plot
      - test -f data/standard_verification_data.json
      - bash -lc 'f=$(python3 -c "import json;print(json.load(open(\"data/standard_verification_data.json\"))[\"fileName\"])"); test -n "$f" && test -f "data/$f"'

  run:
    desc: 本番同等の全実行
    cmds:
      - task: pipeline:orchestrate
      - task: pipeline:verify
      - task: pipeline:discover
      - task: pipeline:benchmark
      - task: pipeline:analyze
      - task: pipeline:mine
      - task: pipeline:verification-plot

  run:quick:
    desc: 高速実行（検証+探索+ベンチ+監査プロット）
    cmds:
      - task: pipeline:verify
      - task: pipeline:discover
      - task: pipeline:benchmark
      - task: pipeline:verification-plot

  clean:logs:
    desc: ログ掃除
    cmds:
      - rm -rf logs/unified/*
      - rm -rf ts-agent/logs/cache/*
