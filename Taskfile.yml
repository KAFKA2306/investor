version: "3"

vars:
  TS_DIR: ts-agent
  DASHBOARD_DIR: ts-agent/src/dashboard

tasks:
  default:
    cmds:
      - task: check

  check:
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format
      - bun run lint
      - bun run typecheck

  run:
    dir: "{{.TS_DIR}}"
    cmds:
      - cmd: bun ./src/experiments/discover_alpha_factors.ts
      - cmd: bun ./src/pipeline/evaluate/run_foundation_benchmark_pipeline.ts

  view:
    dir: "{{.DASHBOARD_DIR}}"
    cmds:
      - npm run dev