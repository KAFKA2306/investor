
version: "3"

vars:
  TS_DIR: ts-agent

tasks:
  default:
    desc: 全部まとめてお掃除＆チェックするよっ ✨
    cmds:
      - task: lint
      - task: format
      - task: check

  setup:
    desc: 依存関係をインストールして準備するよっ ✨
    cmds:
      - cd {{.TS_DIR}} && bun install
      - task: setup:models

  setup:models:
    desc: Python 財団 models の環境を整えるよっ ✨
    cmds:
      - cd {{.TS_DIR}}/src/experiments/foundation_models && uv sync

  lint:
    desc: Biome でコードをピカピカにするよっ ✨
    cmds:
      - cd {{.TS_DIR}} && bun run lint

  format:
    desc: Biome でコードを整列させるよっ ✨
    cmds:
      - cd {{.TS_DIR}} && bun run format

  check:
    desc: TypeScript の型チェックで安全確認っ ✨
    cmds:
      - cd {{.TS_DIR}} && bun run typecheck

  daily:
    desc: 日次Runbook（品質→API検証→シナリオ→本線→A/B比較→Readiness）を実行する
    deps: [lint, check]
    cmds:
      - cd {{.TS_DIR}} && bun run verify:api
      - cd {{.TS_DIR}} && bun run verify:scenario
      - cd {{.TS_DIR}} && bun run start
      - cd {{.TS_DIR}} && bun run pipeline:ab
      - cd {{.TS_DIR}} && bun run pipeline:llm-readiness

  pipeline:mine:
    desc: 因子候補を生成・評価・進化してregistryへ保存する
    deps: [check]
    cmds:
      - cd {{.TS_DIR}} && bun run pipeline:mine

  pipeline:llm-readiness:
    desc: LLM trading survey基準の運用Readinessを定量スコア化する
    deps: [check]
    cmds:
      - cd {{.TS_DIR}} && bun run pipeline:llm-readiness

  dashboard:
    desc: モダンな投資ダッシュボードをビルドするよっ ✨
    cmds:
      - cd {{.TS_DIR}}/src/tools/dashboard && npm run build

  dashboard:dev:
    desc: ダッシュボードの開発サーバーを起動するよっ ✨
    cmds:
      - cd {{.TS_DIR}}/src/tools/dashboard && npm run dev
