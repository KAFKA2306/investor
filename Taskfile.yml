version: "3"

vars:
  TS_DIR: ts-agent
  DASHBOARD_DIR: ts-agent/src/dashboard
  API_PORT: '{{default "8787" .API_PORT}}'
  UI_PORT: '{{default "5173" .UI_PORT}}'

tasks:
  default:
    desc: タスク一覧を表示
    cmds:
      - task: help

  help:
    desc: 利用可能なタスクを表示
    cmds:
      - task --list-all

  setup:
    desc: 依存関係をインストール
    cmds:
      - cmd: bun install
        dir: "{{.TS_DIR}}"
      - cmd: npm install
        dir: "{{.DASHBOARD_DIR}}"

  format:
    desc: Biome format
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format

  lint:
    desc: Biome lint
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run lint

  typecheck:
    desc: TypeScript 型検査
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run typecheck

  check:
    desc: format + lint + typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format
      - bun run lint
      - bun run typecheck

  api:
    desc: UQTL API サーバ起動
    dir: "{{.TS_DIR}}"
    cmds:
      - UQTL_API_PORT={{.API_PORT}} bun run start:api

  ui:
    desc: ダッシュボード起動
    dir: "{{.DASHBOARD_DIR}}"
    cmds:
      - npm run dev -- --host 127.0.0.1 --port {{.UI_PORT}}

  view:
    desc: API とダッシュボードを同時起動
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          cleanup() {
            echo "[view] cleaning up processes...";
            [ -n "${api_pid:-}" ] && kill "$api_pid" 2>/dev/null || true;
            [ -n "${ui_pid:-}" ] && kill "$ui_pid" 2>/dev/null || true;
            # 念のためポートを占有しているプロセスを掃除
            fuser -k {{.API_PORT}}/tcp 2>/dev/null || true;
            fuser -k {{.UI_PORT}}/tcp 2>/dev/null || true;
          };
          trap cleanup EXIT INT TERM;
          if curl -fsS "http://127.0.0.1:{{.API_PORT}}/api/stats" >/dev/null 2>&1; then
            echo "[view] API already running on :{{.API_PORT}}";
          else
            (cd {{.TS_DIR}} && UQTL_API_PORT={{.API_PORT}} bun run start:api) & api_pid=$!;
            echo "[view] started API on :{{.API_PORT}} (pid: $api_pid)";
          fi;
          (cd {{.DASHBOARD_DIR}} && npm run dev -- --host 127.0.0.1 --port {{.UI_PORT}}) & ui_pid=$!;
          echo "[view] started UI on :{{.UI_PORT}} (pid: $ui_pid)";
          wait "$ui_pid"'

  benchmark:foundation:
    desc: 基礎モデル（Chronos/TimesFM）による e-Stat ベンチマーク実行
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run pipeline:foundation-benchmark

  discovery:
    desc: 直行アルファ探索と基礎モデルによる相関チェック (Full Workflow)
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:alpha-discovery
      - task: benchmark:foundation

  run:
    desc: 全パイプラインの実行
    dir: "{{.TS_DIR}}"
    cmds:
      - task: discovery
      - bun run experiments:benchmark
      - bun run pipeline:llm-readiness

  run:newalphasearch:
    desc: .agent/workflows/newalphasearch.md と同等の探索を実行
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:alpha-discovery
      - bun run pipeline:ab
