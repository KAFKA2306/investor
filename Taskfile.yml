version: "3"

vars:
  TS_DIR: ts-agent
  DASHBOARD_DIR: ts-agent/src/dashboard

tasks:
  default:
    cmds:
      - task: check

  check:
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format
      - bun run lint
      - bun run typecheck

  run:
    deps: [check]
    cmds:
      - cmd: bun src/experiments/les_reproduction.ts
        dir: "{{.TS_DIR}}"
      - cmd: bun src/experiments/04_foundation_benchmark.ts
        dir: "{{.TS_DIR}}"

  view:
    dir: "{{.DASHBOARD_DIR}}"
    cmds:
      - npm run dev