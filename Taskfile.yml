version: "3"

vars:
  TS_DIR: ts-agent
  DASHBOARD_DIR: ts-agent/src/tools/dashboard

tasks:
  default:
    desc: Default task (Runs check)
    cmds:
      - task: check

  setup:
    desc: Install all dependencies (Node.js & Python) 🔧
    cmds:
      - cd {{.TS_DIR}} && bun install
      - cd {{.TS_DIR}}/src/experiments/foundation_models && uv sync
      - echo "✨ Setup complete!"

  check:
    desc: Lint, Format, and Typecheck 🧹
    cmds:
      - cd {{.TS_DIR}} && bun run format
      - cd {{.TS_DIR}} && bun run lint
      - cd {{.TS_DIR}} && bun run typecheck
      - echo "✨ Code is clean and safe!"

  verify:
    desc: Verify environment (API & Models) 🔍
    cmds:
      - cd {{.TS_DIR}} && bun run verify:api
      - cd {{.TS_DIR}}/src/experiments/foundation_models && uv run python check_installation.py
      - echo "✨ Environment is ready!"

  run:
    desc: Run the Main Pipeline (LES Reproduction + Benchmarks + Dashboard Update) 🚀
    deps: [check, verify]
    cmds:
      - echo "Running LES Reproduction..."
      - cd {{.TS_DIR}} && bun src/experiments/les_reproduction.ts
      - echo "Running Foundation Benchmark..."
      - cd {{.TS_DIR}} && bun src/experiments/04_foundation_benchmark.ts
      - echo "Updating Dashboard Manifests..."
      - cd {{.DASHBOARD_DIR}} && bun scripts/generate-log-manifest.mjs ../../../../logs/daily
      - cd {{.DASHBOARD_DIR}} && bun scripts/generate-log-manifest.mjs ../../../../logs/unified
      - cd {{.DASHBOARD_DIR}} && bun scripts/generate-log-manifest.mjs ../../../../logs/benchmarks
      - echo "✨ Run complete! Use 'task view' to see results."

  view:
    desc: Start the Dashboard 📊
    cmds:
      - cd {{.DASHBOARD_DIR}} && npm run dev

  score:
    desc: Calculate LLM Readiness Score 🎯
    cmds:
      - cd {{.TS_DIR}} && bun run pipeline:llm-readiness
