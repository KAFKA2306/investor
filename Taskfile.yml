version: "3"

vars:
  TS_DIR: ts-agent
  DASHBOARD_DIR: ts-agent/src/dashboard
  API_PORT: '{{default "8787" .API_PORT}}'
  UI_PORT: '{{default "5173" .UI_PORT}}'
  VIEWER_PORT: '{{default "3400" .VIEWER_PORT}}'

tasks:
  default:
    desc: タスク一覧
    cmds:
      - task --list-all

  deps:
    desc: 依存関係をインストール
    cmds:
      - cmd: bun install
        dir: "{{.TS_DIR}}"
      - cmd: npm install
        dir: "{{.DASHBOARD_DIR}}"

  python:uv:sync:
    desc: uv 環境同期
    cmds:
      - bash -lc 'set -euo pipefail; cache_root="${TMPDIR:-/tmp}/ts-agent-cache"; uv_cache_dir="$cache_root/uv"; mkdir -p "$cache_root" "$uv_cache_dir"; UV_CACHE_DIR="$uv_cache_dir" XDG_CACHE_HOME="$cache_root" uv sync'

  qa:
    desc: format + lint + typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format
      - bun run lint
      - bun run typecheck

  check:
    desc: format + lint + typecheck (Alias for qa)
    cmds:
      - task: qa

  qa:fast:
    desc: lint + typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run lint
      - bun run typecheck

  format:
    desc: format
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run format

  lint:
    desc: lint
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run lint

  typecheck:
    desc: typecheck
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run typecheck

  api:
    desc: API起動
    dir: "{{.TS_DIR}}"
    cmds:
      - UQTL_API_PORT={{.API_PORT}} bun run start:api

  ui:
    desc: UI起動
    dir: "{{.DASHBOARD_DIR}}"
    cmds:
      - npm run dev -- --host 127.0.0.1 --port {{.UI_PORT}}

  viewer:
    desc: claude-code-viewer 起動（既定ポート 3400）
    cmds:
      - claude-code-viewer --port {{.VIEWER_PORT}}

  view:
    desc: API + UI 起動
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          cleanup() {
            [ -n "${api_pid:-}" ] && kill "$api_pid" 2>/dev/null || true;
            [ -n "${ui_pid:-}" ] && kill "$ui_pid" 2>/dev/null || true;
            fuser -k {{.API_PORT}}/tcp 2>/dev/null || true;
            fuser -k {{.UI_PORT}}/tcp 2>/dev/null || true;
          };
          trap cleanup EXIT INT TERM;
          (cd {{.TS_DIR}} && UQTL_API_PORT={{.API_PORT}} bun run start:api) & api_pid=$!;
          (cd {{.DASHBOARD_DIR}} && npm run dev -- --host 127.0.0.1 --port {{.UI_PORT}}) & ui_pid=$!;
          wait "$ui_pid"'

  pipeline:orchestrate:
    desc: 設計本流（sequence/simpleflowchart準拠）
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:verification-json
      - bun run start

  pipeline:verify:
    desc: API検証
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run verify:api

  pipeline:discover:
    desc: 因子探索
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run experiments:alpha-discovery

  pipeline:benchmark:
    desc: 基礎ベンチマーク
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run pipeline:backtest

  pipeline:analyze:
    desc: モデル分析
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run pipeline:ab

  pipeline:mine:
    desc: マイニング
    dir: "{{.TS_DIR}}"
    cmds:
      - bun run pipeline:mine

  pipeline:verification-plot:
    desc: バックテスト結果を可視化 (Python)
    dir: "{{.TS_DIR}}"
    cmds:
      - bash -lc 'v=$(bun -e "import { core } from \"./src/system/app_runtime_core.ts\"; console.log(core.config.paths.verification)"); rm -f "$v/standard_verification_data.json"'
      - bun run experiments:verification-json
      - bash -lc 'set -euo pipefail; v=$(bun -e "import { core } from \"./src/system/app_runtime_core.ts\"; console.log(core.config.paths.verification)"); cache_root="${TMPDIR:-/tmp}/ts-agent-cache"; uv_cache_dir="$cache_root/uv"; mkdir -p "$cache_root" "$uv_cache_dir"; VERIFICATION_DIR="$v" UV_CACHE_DIR="$uv_cache_dir" XDG_CACHE_HOME="$cache_root" bun run experiments:verification-plot'
      - bash -lc 'v=$(bun -e "import { core } from \"./src/system/app_runtime_core.ts\"; console.log(core.config.paths.verification)"); test -f "$v/standard_verification_data.json"'
      - bash -lc 'v=$(bun -e "import { core } from \"./src/system/app_runtime_core.ts\"; console.log(core.config.paths.verification)"); f=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))[\"fileName\"])" "$v/standard_verification_data.json"); test -n "$f" && test -f "$v/$f"'

  pipeline:edinet-daily:
    desc: EDINET日次フロー（features -> macro -> kb-build -> gated backtest）
    dir: "{{.TS_DIR}}"
    vars:
      FROM: '{{default "2023-01-01" .FROM}}'
      TO: '{{default "2025-12-31" .TO}}'
      LIMIT: '{{default "3000" .LIMIT}}'
      TOP_K: '{{default "5" .TOP_K}}'
      MIN_SIGNALS: '{{default "4" .MIN_SIGNALS}}'
      TRADE_LAG_DAYS: '{{default "2" .TRADE_LAG_DAYS}}'
    cmds:
      - bun run experiments:10k-features -- --from {{.FROM}} --to {{.TO}} --metadata-only --indexed-only
      - bun run experiments:build-macro-regime
      - bun run experiments:kb-build -- --limit {{.LIMIT}}
      - bun run experiments:kb-backtest -- --with-gates --top-k {{.TOP_K}} --min-signals-per-day {{.MIN_SIGNALS}} --trade-lag-days {{.TRADE_LAG_DAYS}}

  pipeline:proof-layers:
    desc: 管理レイヤー実証（ユニバース動的解決 + 研究マニフェスト）
    dir: "{{.TS_DIR}}"
    cmds:
      - bun -e 'import { DataPipelineRuntime } from "./src/system/data_pipeline_runtime.ts"; const r=new DataPipelineRuntime(); const u=r.resolveUniverse([],20); console.log(JSON.stringify({proof:"dynamic_universe", count:u.length, sample:u.slice(0,10)},null,2)); if(u.length===0) throw new Error("universe unresolved");'
      - bun -e 'import { QuantResearchRuntime } from "./src/system/data_pipeline_runtime.ts"; const q=new QuantResearchRuntime(); const m=q.buildManifest(["1301","1332"],"20220831",0.8); console.log(JSON.stringify({proof:"quant_manifest", manifest:m, window:q.deriveVerificationWindow("20220831")},null,2));'

  run:newalphasearch:cycle:
    desc: 自律アルファ探索の1サイクル（theme更新 + 探索 + 改善）
    cmds:
      - task: typecheck
      - task: pipeline:proof-layers
      - task: pipeline:verify
      - task: pipeline:orchestrate
      - task: pipeline:discover
      - task: pipeline:analyze
      - task: pipeline:verification-plot
      - task: pipeline:mine

  run:newalphasearch:
    desc: 自律アルファ探索（ループ必須。既定3サイクル）
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          cycles="${ALPHA_LOOP_MAX_CYCLES:-3}";
          input_channel="${UQTL_INPUT_CHANNEL:-task}";
          if [ "$cycles" -lt 1 ]; then
            cycles=1;
          fi;
          ALPHA_LOOP_MAX_CYCLES="$cycles" UQTL_INPUT_CHANNEL="$input_channel" UQTL_NL_INPUT="${UQTL_NL_INPUT:-}" UQTL_NL_INPUT_FILE="${UQTL_NL_INPUT_FILE:-}" task run:newalphasearch:loop'

  run:newalphasearch:nl:
    desc: 自然言語入力つき自律アルファ探索（Task経路固定）
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          prompt="${NL_INPUT:-${UQTL_NL_INPUT:-}}";
          if [ -z "${prompt}" ]; then
            echo "[run:newalphasearch:nl] NL_INPUT or UQTL_NL_INPUT is required";
            exit 1;
          fi;
          UQTL_NL_INPUT="$prompt" UQTL_INPUT_CHANNEL="${UQTL_INPUT_CHANNEL:-codex}" task run:newalphasearch'

  run:newalphasearch:loop:
    desc: 自律アルファ探索を連続ループ実行（自律探索/改善/テーマ更新を毎サイクル必須実行）
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          max_cycles="${ALPHA_LOOP_MAX_CYCLES:-3}";
          sleep_sec="${ALPHA_LOOP_SLEEP_SEC:-0}";
          max_failures="${ALPHA_LOOP_MAX_FAILURES:-3}";
          input_channel="${UQTL_INPUT_CHANNEL:-task}";
          nl_input="${UQTL_NL_INPUT:-}";
          nl_input_file="${UQTL_NL_INPUT_FILE:-}";
          if [ -z "$nl_input" ] && [ -n "$nl_input_file" ] && [ -f "$nl_input_file" ]; then
            nl_input="$(cat "$nl_input_file")";
          fi;
          run_scope="$(date +%Y%m%dT%H%M%S)_$$";
          seen_signatures_file="${UQTL_SEEN_SIGNATURES_FILE:-/tmp/uqtl_seen_selected_alpha_signatures_${run_scope}.txt}";
          if [ -n "${UQTL_SEEN_SIGNATURES_FILE:-}" ]; then
            touch "$seen_signatures_file";
          else
            : > "$seen_signatures_file";
          fi;
          if [ "$max_cycles" -lt 1 ]; then
            max_cycles=1;
          fi;
          cycle=0;
          failures=0;
          while true; do
            cycle=$((cycle+1));
            run_id="uqtl_$(date +%Y%m%dT%H%M%S)_${cycle}";
            before_count=$(find logs/unified -maxdepth 1 -type f -name "alpha_discovery_*.json" 2>/dev/null | wc -l | tr -d " ");
            before_plot_ts=$(f=$(ls -1t ts-agent/data/VERIF_*.png 2>/dev/null | head -n1); if [ -n "$f" ]; then stat -c %Y "$f"; else echo 0; fi);
            echo "[loop] cycle=${cycle} run_id=${run_id} channel=${input_channel} nl_input_len=${#nl_input} started_at=$(date -Is)";
            if UQTL_RUN_ID="$run_id" UQTL_LOOP_ITERATION="$cycle" UQTL_INPUT_CHANNEL="$input_channel" UQTL_NL_INPUT="$nl_input" task run:newalphasearch:cycle; then
              after_count=$(find logs/unified -maxdepth 1 -type f -name "alpha_discovery_*.json" 2>/dev/null | wc -l | tr -d " ");
              after_plot_ts=$(f=$(ls -1t ts-agent/data/VERIF_*.png 2>/dev/null | head -n1); if [ -n "$f" ]; then stat -c %Y "$f"; else echo 0; fi);
              if [ "$after_count" -le "$before_count" ]; then
                echo "[loop] cycle=${cycle} status=fail reason=no_new_alpha_discovery_log before=${before_count} after=${after_count}";
                failures=$((failures+1));
                if [ "$failures" -ge "$max_failures" ]; then
                  echo "[loop] termination_reason=max_failures_reached";
                  exit 1;
                fi
              else
                latest_file=$(ls -1t logs/unified/alpha_discovery_*.json | head -n1);
                selected_count=$(python3 -c "import json,sys; j=json.load(open(sys.argv[1], encoding=\"utf-8\")); print(len((j.get(\"payload\") or {}).get(\"selected\", [])))" "$latest_file");
                if [ "${selected_count}" -lt 1 ]; then
                  echo "[loop] cycle=${cycle} status=fail reason=no_selected_alpha latest=${latest_file}";
                  failures=$((failures+1));
                  if [ "$failures" -ge "$max_failures" ]; then
                    echo "[loop] termination_reason=max_failures_reached";
                    exit 1;
                  fi
                else
                  new_alpha_found=0;
                  while IFS= read -r signature; do
                    [ -z "$signature" ] && continue;
                    if ! grep -Fxq "$signature" "$seen_signatures_file"; then
                      new_alpha_found=1;
                    fi
                    echo "$signature" >> "$seen_signatures_file";
                  done < <(python3 -c "import json,sys; j=json.load(open(sys.argv[1], encoding=\"utf-8\")); payload=(j.get(\"payload\") or {}); details=payload.get(\"selectedDetails\") or []; out=[]; [out.append(\"hash:\"+str((d or {}).get(\"ideaHash\",\"\")).strip()) for d in details if str((d or {}).get(\"ideaHash\",\"\")).strip()]; [out.append(\"id:\"+str(x)) for x in (payload.get(\"selected\") or [])] if not out else None; [print(v) for v in out]" "$latest_file")
                  sort -u "$seen_signatures_file" -o "$seen_signatures_file";
                  if [ "$new_alpha_found" -ne 1 ]; then
                    echo "[loop] cycle=${cycle} status=fail reason=no_new_alpha_detected latest=${latest_file}";
                    failures=$((failures+1));
                    if [ "$failures" -ge "$max_failures" ]; then
                      echo "[loop] termination_reason=max_failures_reached";
                      exit 1;
                    fi
                  else
                    if [ "${after_plot_ts}" -le "${before_plot_ts}" ]; then
                      echo "[loop] cycle=${cycle} status=fail reason=no_new_plot before_ts=${before_plot_ts} after_ts=${after_plot_ts}";
                      failures=$((failures+1));
                      if [ "$failures" -ge "$max_failures" ]; then
                        echo "[loop] termination_reason=max_failures_reached";
                        exit 1;
                      fi
                    else
                      echo "[loop] cycle=${cycle} evidence=new_log before=${before_count} after=${after_count} selected=${selected_count} plot_ts=${after_plot_ts}";
                      failures=0;
                      echo "[loop] cycle=${cycle} status=ok";
                    fi
                  fi
                fi
              fi
            else
              failures=$((failures+1));
              echo "[loop] cycle=${cycle} status=fail failures=${failures}/${max_failures}";
              if [ "$failures" -ge "$max_failures" ]; then
                echo "[loop] termination_reason=max_failures_reached";
                exit 1;
              fi
            fi
            if [ "$max_cycles" -gt 0 ] && [ "$cycle" -ge "$max_cycles" ]; then
              echo "[loop] termination_reason=max_cycles_reached";
              break;
            fi
            if [ "$sleep_sec" -gt 0 ]; then
              echo "[loop] sleeping=${sleep_sec}s";
              sleep "$sleep_sec";
            fi
          done'

  run:
    desc: 本番同等の全実行（型検査 + 管理レイヤー実証 + パイプライン）
    cmds:
      - task: run:newalphasearch
      - task: pipeline:orchestrate
      - task: pipeline:benchmark

  run:quick:
    desc: 高速実行（型検査+実証+検証+探索+ベンチ+監査プロット）
    cmds:
      - task: typecheck
      - task: pipeline:proof-layers
      - task: pipeline:verify
      - task: pipeline:discover
      - task: pipeline:benchmark
      - task: pipeline:verification-plot

  jquants:warm-all:start:
    desc: J-Quants日次バーを最小リクエストで全期間キャッシュ（完了までループ）
    cmds:
      - cmd: >
          bash -lc 'set -euo pipefail;
          cat > /tmp/jquants_warm_until_finish.sh << "SH"
          #!/usr/bin/env bash
          set -u
          cd /home/kafka/finance/investor/ts-agent || exit 1
          set -a
          source ../.env
          set +a
          LOG=/tmp/jquants_warm_until_finish.log
          echo "[start] $(date -Is)" >> "$LOG"
          while true; do
            echo "[run] $(date -Is)" >> "$LOG"
            OUT=$(bun run jquants:warm-cache --mode date --from 2021-03-01 --to 2026-03-01 --date-order desc --req-per-30sec 1 --max-rate-limit-errors 2 2>&1)
            CODE=$?
            printf "%s\n" "$OUT" >> "$LOG"
            if [ $CODE -ne 0 ]; then
              echo "[warn] $(date -Is) exit=$CODE sleep60" >> "$LOG"
              sleep 60
              continue
            fi
            if printf "%s" "$OUT" | grep -q "abortedByRateLimit\": true"; then
              echo "[cooldown] $(date -Is) sleep310" >> "$LOG"
              sleep 310
              continue
            fi
            if printf "%s" "$OUT" | grep -q "abortedByRateLimit\": false"; then
              echo "[done] $(date -Is)" >> "$LOG"
              break
            fi
            echo "[warn] $(date -Is) no-marker sleep60" >> "$LOG"
            sleep 60
          done
          SH
          chmod +x /tmp/jquants_warm_until_finish.sh
          nohup /tmp/jquants_warm_until_finish.sh >/tmp/jquants_warm_until_finish.nohup 2>&1 & echo $! > /tmp/jquants_warm_until_finish.pid
          echo "PID=$(cat /tmp/jquants_warm_until_finish.pid)"'

  jquants:warm-all:status:
    desc: J-Quants全期間キャッシュジョブの状態確認
    cmds:
      - bash -lc 'if [ -f /tmp/jquants_warm_until_finish.pid ]; then PID=$(cat /tmp/jquants_warm_until_finish.pid); ps -fp "$PID" || true; else echo "PID file not found"; fi'

  jquants:warm-all:log:
    desc: J-Quants全期間キャッシュジョブのログ表示
    cmds:
      - bash -lc 'tail -n 120 /tmp/jquants_warm_until_finish.log'

  jquants:warm-all:stop:
    desc: J-Quants全期間キャッシュジョブを停止
    cmds:
      - bash -lc 'if [ -f /tmp/jquants_warm_until_finish.pid ]; then kill "$(cat /tmp/jquants_warm_until_finish.pid)" 2>/dev/null || true; rm -f /tmp/jquants_warm_until_finish.pid; echo "stopped"; else echo "PID file not found"; fi'

  clean:logs:
    desc: ログ掃除
    cmds:
      - rm -rf logs/unified/*
      - rm -rf ts-agent/logs/cache/*
