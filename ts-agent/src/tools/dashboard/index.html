<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本語ビギナークオンツ ダッシュボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <header>
      <div class="logo">
        <span>日本語 Beginner Quant Analyst</span>
      </div>
      <div id="system-info">
        <div class="static-chip">JSON ONLY</div>
        <div id="last-update">更新: --</div>
      </div>
    </header>

    <aside class="sidebar">
      <section class="glass-panel">
        <div class="section-title">日次ログ</div>
        <div id="log-list" class="log-list"></div>
      </section>

      <section class="glass-panel">
        <div class="section-title">ベンチマークログ</div>
        <div id="bench-list" class="log-list"></div>
      </section>

      <section class="glass-panel">
        <div class="section-title">モデルレジストリ</div>
        <div id="registry-list" class="log-list"></div>
      </section>

      <section class="glass-panel">
        <div class="section-title">判定ステータス</div>
        <div id="workflow-status" class="status-list"></div>
      </section>
    </aside>

    <main class="main-content">
      <section id="leaderboard-section" class="glass-panel" style="margin-bottom: 1.5rem;">
        <div class="section-title">🏆 戦略リーダーボード（経済的指標比較）</div>
        <div id="leaderboard-table" class="leaderboard-grid">
          <!-- JS dynamic content -->
          <div class="log-sub">データを読み込み中...</div>
        </div>
      </section>

      <section id="summary-section" class="glass-panel stat-group">
        <div class="stat-card">
          <span class="stat-label">期待エッジ</span>
          <span id="stat-edge" class="stat-value">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">バスケット収益</span>
          <span id="stat-return" class="stat-value">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">ケリー比率</span>
          <span id="stat-kelly" class="stat-value">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">注目銘柄</span>
          <span id="stat-top" class="stat-value">--</span>
        </div>
      </section>

      <div class="detail-container">
        <section class="glass-panel" style="grid-column: 1 / -1;">
          <div class="section-title">銘柄分析（初心者向け）</div>
          <div id="symbol-analysis" class="symbol-grid"></div>
        </section>

        <section class="glass-panel" style="grid-column: 1 / -1;">
          <div class="section-title">統一検証ログ（Scenario/Experiment/Pipeline）</div>
          <div id="validation-results" class="symbol-grid"></div>
        </section>

        <section class="glass-panel">
          <div class="section-title">戦略メモ</div>
          <div id="verdict-content" class="metrics-box" style="height: 100%;"></div>
        </section>

        <section class="glass-panel">
          <div class="section-title">生JSON（読み取り専用）</div>
          <div id="json-content" class="metrics-box" style="height: 100%;"></div>
        </section>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
