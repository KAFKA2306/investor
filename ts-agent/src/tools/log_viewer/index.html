<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Log Viewer</title>
    <style>
      :root {
        --bg: #f7f9f4;
        --panel: #ffffff;
        --ink: #1f2a1f;
        --muted: #5b6a5d;
        --accent: #2f7d32;
        --warn: #9a3412;
        --ok: #166534;
        --line: #d8e2d2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans JP", "Noto Sans JP", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 10%, #eef8ea 0%, var(--bg) 48%, #edf1e7 100%);
      }
      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        gap: 14px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }
      h1 { margin: 0 0 6px; font-size: 1.4rem; }
      .muted { color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }
      .k { font-size: 12px; color: var(--muted); }
      .v { font-size: 18px; font-weight: 650; }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th, td {
        text-align: left;
        padding: 8px 6px;
        border-bottom: 1px solid var(--line);
      }
      tbody tr:hover { background: #f4f8ef; cursor: pointer; }
      .ok { color: var(--ok); font-weight: 650; }
      .warn { color: var(--warn); font-weight: 650; }
      pre {
        margin: 0;
        padding: 12px;
        border-radius: 10px;
        background: #1b1f1b;
        color: #d4f4cc;
        overflow: auto;
        max-height: 380px;
      }
      @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Daily Log Viewer</h1>
        <div class="muted">`logs/daily/*.json` を一覧と詳細で可視化</div>
      </section>

      <section class="panel grid" id="summary-cards"></section>

      <section class="panel">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Verdict</th>
              <th>Data</th>
              <th>Alpha</th>
              <th>Edge</th>
              <th>Return</th>
              <th>Top</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>

      <section class="panel">
        <div class="muted" style="margin-bottom: 8px">Selected Log JSON</div>
        <pre id="json">{}</pre>
      </section>
    </main>

    <script>
      const num = (v) => (Number.isFinite(v) ? v.toFixed(4) : "-");
      const okClass = (v) => (v === "PASS" || v === "USEFUL" ? "ok" : "warn");

      const renderCards = (logs) => {
        const n = logs.length;
        const useful = logs.filter((x) => x.verdict === "USEFUL").length;
        const passData = logs.filter((x) => x.dataReadiness === "PASS").length;
        const avgEdge = logs.reduce((a, b) => a + (Number.isFinite(b.expectedEdge) ? b.expectedEdge : 0), 0) / (n || 1);

        document.getElementById("summary-cards").innerHTML = [
          ["Log Count", String(n)],
          ["USEFUL", String(useful)],
          ["Data PASS", String(passData)],
          ["Avg Edge", num(avgEdge)],
        ]
          .map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`)
          .join("");
      };

      const renderRows = (logs) => {
        const tbody = document.getElementById("rows");
        tbody.innerHTML = logs
          .map(
            (l) =>
              `<tr data-date="${l.date}">
                <td>${l.date}</td>
                <td>${l.reportType || "-"}</td>
                <td class="${okClass(l.verdict)}">${l.verdict || "-"}</td>
                <td class="${okClass(l.dataReadiness)}">${l.dataReadiness || "-"}</td>
                <td class="${okClass(l.alphaReadiness)}">${l.alphaReadiness || "-"}</td>
                <td>${num(l.expectedEdge)}</td>
                <td>${num(l.basketDailyReturn)}</td>
                <td>${l.topSymbol || "-"}</td>
              </tr>`,
          )
          .join("");

        tbody.querySelectorAll("tr").forEach((tr) => {
          tr.addEventListener("click", () => showDetail(tr.dataset.date));
        });
      };

      const showDetail = async (date) => {
        const res = await fetch(`/api/logs/${date}`);
        const json = await res.json();
        document.getElementById("json").textContent = JSON.stringify(json, null, 2);
      };

      const boot = async () => {
        const res = await fetch("/api/logs");
        const logs = await res.json();
        renderCards(logs);
        renderRows(logs);
        logs[0] && showDetail(logs[0].date);
      };

      boot();
    </script>
  </body>
</html>
