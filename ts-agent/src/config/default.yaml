project:
  name: investor-ts

paths:
  data: /mnt/d/marketdata
  logs: ../../../logs
  verification: ../../../ts-agent/data
  marketdataRoot: /mnt/d/marketdata
  marketdataPricesGz: /mnt/d/marketdata/raw_stock_price.csv.gz
  marketdataPricesCsv: /mnt/d/marketdata/raw_stock_price.csv
  marketdataFinGz: /mnt/d/marketdata/raw_stock_fin.csv.gz
  marketdataFinCsv: /mnt/d/marketdata/raw_stock_fin.csv
  marketdataListGz: /mnt/d/marketdata/stock_list.csv.gz
  marketdataListCsv: /mnt/d/marketdata/stock_list.csv
  marketdataLabelsGz: /mnt/d/marketdata/stock_labels.csv.gz
  marketdataLabelsCsv: /mnt/d/marketdata/stock_labels.csv
  marketdataStatementsDir: /mnt/d/marketdata/raw_statements
  outputsRoot: ../../../ts-agent/data
  outputsVerificationJson: ../../../ts-agent/data/standard_verification_data.json
  outputsVerificationPlotDir: ../../../ts-agent/data
  outputsPlaybook: ../../../ts-agent/data/playbook.json
  cacheDir: ../../../logs/cache
  cacheMarketSqlite: ../../../logs/cache/market_cache.sqlite
  cacheMarketdataSqlite: ../../../logs/cache/marketdata.sqlite
  cacheHttpSqlite: ../../../logs/cache/http_cache.sqlite
  cacheYahooSqlite: ../../../logs/cache/yahoo_finance_cache.sqlite
  cacheJquantsPeadSqlite: ../../../logs/cache/jquants_pead_cache.sqlite
  cacheEdinetSqlite: ../../../logs/cache/edinet_cache.sqlite
  edinetDocsDir: ../../../logs/cache/edinet_docs
  cacheUqtlSqlite: ../../../logs/cache/uqtl.sqlite
  logsUnifiedDir: ../../../logs/unified
  docsRoot: ../../../docs
  docsDiagramsDir: ../../../docs/diagrams
  docsPaperDir: ../../../docs/paper
  docsNikkiDir: ../../../docs/nikki
  workflowsDir: ../../../.agent/workflows

providers:
  yfinance:
    enabled: true
  jquants:
    enabled: true
  edinet:
    enabled: true
  estat:
    enabled: true
  ai:
    enabled: true
  python:
    uvPath: /root/.local/bin/uv

benchmark:
  foundation:
    noiseThresholdMultiplier: 0.5
    overconfidenceThreshold: 0.8
  orthogonalityThreshold: 0.5

universe:
  symbols: []

execution:
  costs:
    feeBps: 1.0
    slippageBps: 0.5

alpha:
  edinet:
    gates:
      minSignalsPerDay: 4
      maxCorrection90d: 2
      minLiquidityJpy: 100000000
      regimeAllowlist: [RISK_ON, NEUTRAL]
    weights:
      base:
        riskDelta: 0.5
        pead1d: 0.3
        pead5d: 0.2

logging:
  envelope:
    version: v2
