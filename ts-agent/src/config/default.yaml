project:
  name: investor-ts

paths:
  data: /mnt/d/marketdata
  logs: ../../../logs

providers:
  yfinance:
    enabled: true
  jquants:
    enabled: true
  edinet:
    enabled: true
  estat:
    enabled: true
  ai:
    enabled: true
  python:
    uvPath: /root/.local/bin/uv

benchmark:
  foundation:
    noiseThresholdMultiplier: 0.5
    overconfidenceThreshold: 0.8
  orthogonalityThreshold: 0.5

universe:
  symbols: ["7203", "9984", "8035", "6758", "4063"]

execution:
  costs:
    feeBps: 1.0
    slippageBps: 0.5

logging:
  envelope:
    version: v2
