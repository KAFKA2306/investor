name: Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      UQTL_DATA_ROOT: ${{ github.workspace }}/data
      UQTL_LOGS_ROOT: ${{ github.workspace }}/logs
      UQTL_CACHE_ROOT: ${{ github.workspace }}/cache
      UQTL_VERIFICATION_ROOT: ${{ github.workspace }}/verification
      UQTL_EDINET_ROOT: ${{ github.workspace }}/edinet
      UQTL_PREPROCESSED_ROOT: ${{ github.workspace }}/preprocessed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup
        run: |
          mkdir -p data logs cache verification edinet preprocessed
          task setup

      - name: Run smoke checks
        run: task smoke
