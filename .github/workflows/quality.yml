name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup
        run: |
          mkdir -p data logs
          task setup
        env:
          UQTL_DATA_ROOT: ${{ github.workspace }}/data
          UQTL_LOGS_ROOT: ${{ github.workspace }}/logs

      - name: Validate runtime config
        run: task validate:runtime
        env:
          UQTL_DATA_ROOT: ${{ github.workspace }}/data
          UQTL_LOGS_ROOT: ${{ github.workspace }}/logs

      - name: Run quality gate
        run: task check
        env:
          UQTL_DATA_ROOT: ${{ github.workspace }}/data
          UQTL_LOGS_ROOT: ${{ github.workspace }}/logs
