name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup
        run: task setup

      - name: Validate runtime config
        run: task validate:runtime

      - name: Run quality gate
        run: task check
