name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "ts-agent/src/dashboard/**"
      - ".github/workflows/pages-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts-agent/src/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Bundle daily logs for static dashboard
        run: |
          mkdir -p dist/logs/daily
          if ls ../../../logs/daily/*.json >/dev/null 2>&1; then
            cp ../../../logs/daily/*.json dist/logs/daily/
          fi
          bun -e 'import { readdirSync, writeFileSync } from "node:fs"; const dir = process.argv[1]; const files = readdirSync(dir).filter((name) => name.endsWith(".json") && name !== "manifest.json").sort(); writeFileSync(`${dir}/manifest.json`, JSON.stringify(files));' dist/logs/daily
          mkdir -p dist/logs/unified
          if ls ../../../logs/unified/*.json >/dev/null 2>&1; then
            cp ../../../logs/unified/*.json dist/logs/unified/
            bun -e 'import { readdirSync, writeFileSync } from "node:fs"; const dir = process.argv[1]; const files = readdirSync(dir).filter((name) => name.endsWith(".json") && name !== "manifest.json").sort(); writeFileSync(`${dir}/manifest.json`, JSON.stringify(files));' dist/logs/unified
          else
            echo "[]" > dist/logs/unified/manifest.json
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ts-agent/src/dashboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
